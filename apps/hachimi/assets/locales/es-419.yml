steam_overlay_conflict_dialog:
  title: "Aviso"
  content: >-
    Las compras podrían no funcionar con el overlay de Hachimi activado. Si el overlay de Steam ya
    apareció para que hicieras una compra, ignora este mensaje y presiona No. Si no funcionó, presiona Sí
    para desactivar temporalmente el overlay de Hachimi. Cerrará el juego, y la próxima vez que inicie,
    el overlay de Hachimi estará desactivado y podrás hacer una compra. Después, puedes reiniciar
    el juego de nuevo para volver a activar el overlay de Hachimi.
