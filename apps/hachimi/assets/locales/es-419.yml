first_time_setup:
  title: "Configuración inicial"
  welcome_heading: "Bienvenido"
  welcome_content: >-
    ¡Hachimi se instaló! Esto te guiará por el proceso de configuración inicial.
    Si no te interesan las funciones de traducción, puedes omitirlo cerrando esta ventana.


    AVISO: Hachimi es un proyecto impulsado por la comunidad. Todas las traducciones fueron hechas por distintos colaboradores de la comunidad.
    No está desarrollado ni respaldado por Cygames, Inc., y viola los términos de servicio del juego. Al continuar,
    aceptas que lo usarás bajo tu propio riesgo.
  translation_repo_heading: "Repositorio de traducción"
  select_translation_repo: "Selecciona un repositorio de traducción:"
  no_compatible_repo: "Ningún repositorio de traducción es compatible con esta versión del juego."
  skip_translation: "Omitir traducciones."
  complete_heading: "¡Todo listo!"
  complete_content: >-
    Haz clic en Listo para guardar la configuración.
    Si elegiste un repositorio de traducción, se buscará una actualización,
    que te pedirá descargar los nuevos datos de traducción.
  tips_heading: "Bueno saberlo"
  menu_key_tip: "Presiona %{open_key_str} en cualquier momento para abrir el menú de HachimiRedux."
  conflicts_tip: >-
    Usa solo HachimiRedux. Si el juego se cae o se comporta raro, elimina otros mods,
    overlays o inyectores de DLL (por ejemplo, proxies version.dll / winhttp.dll / dxgi.dll,
    u otras DLL de overlay) de la carpeta del juego. Solo los plugins compilados desde
    HachimiRedux deben ir en load_libraries.

