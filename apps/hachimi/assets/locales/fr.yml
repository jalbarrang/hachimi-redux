first_time_setup:
  title: "Configuration initiale"
  welcome_heading: "Bienvenue"
  welcome_content: >-
    Hachimi a été installé ! Ceci vous guidera tout au long du processus de configuration initiale.
    Si vous n'êtes pas intéressé par les fonctionnalités de traduction, vous pouvez l'ignorer en fermant cette fenêtre.


    AVERTISSEMENT : Hachimi est un projet communautaire. Toutes les traductions ont été réalisées par divers contributeurs de la communauté.
    Il n'est ni développé ni approuvé par Cygames, Inc., et enfreint les conditions d'utilisation du jeu. En continuant,
    vous acceptez de l'utiliser à vos propres risques.
  translation_repo_heading: "Dépôt de traduction"
  select_translation_repo: "Sélectionnez un dépôt de traduction :"
  no_compatible_repo: "Aucun dépôt de traduction n'est compatible avec cette version du jeu."
  skip_translation: "Ignorer les traductions."
  complete_heading: "Tout est prêt !"
  complete_content: >-
    Cliquez sur Terminé pour enregistrer la configuration.
    Si vous avez choisi un dépôt de traduction, une recherche de mises à jour sera effectuée,
    qui vous invitera à télécharger les nouvelles données de traduction.
  tips_heading: "Bon à savoir"
  menu_key_tip: "Appuyez sur %{open_key_str} à tout moment pour ouvrir le menu HachimiRedux."
  conflicts_tip: >-
    Utilisez uniquement HachimiRedux. Si le jeu plante ou se comporte étrangement, retirez les autres
    mods de jeu, overlays ou injecteurs de DLL (par ex. les proxys version.dll / winhttp.dll / dxgi.dll,
    ou d'autres DLL d'overlay) du dossier du jeu. Seuls les plugins compilés à partir de HachimiRedux
    doivent figurer dans load_libraries.

