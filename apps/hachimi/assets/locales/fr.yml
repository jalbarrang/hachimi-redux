    py3translationServer ou Sugoi Toolkit. Sans serveur en cours d'exécution, aucune
    traduction supplémentaire n'aura lieu et le gameplay peut être affecté.
    Veuillez laisser cette option désactivée si vous n'avez pas de serveur de
