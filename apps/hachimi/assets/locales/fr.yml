steam_overlay_conflict_dialog:
  title: "Avis"
  content: >-
    Les achats peuvent ne pas fonctionner lorsque l'overlay Hachimi est activé. Si l'overlay Steam
    s'est déjà affiché pour effectuer un achat, ignorez ce message et appuyez sur Non. Si cela n'a pas
    fonctionné, appuyez sur Oui pour désactiver temporairement l'overlay Hachimi. Le jeu se fermera, et au
    prochain démarrage, l'overlay Hachimi sera désactivé et vous pourrez effectuer un achat. Ensuite, vous
    pourrez redémarrer le jeu pour réactiver l'overlay Hachimi.
