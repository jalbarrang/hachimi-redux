first_time_setup:
  title: "Configuração inicial"
  welcome_heading: "Bem-vindo"
  welcome_content: >-
    O Hachimi foi instalado! Isto irá guiá-lo ao longo do processo de configuração inicial.
    Se não estiver interessado em usar as funcionalidades de tradução, pode ignorá-lo fechando esta janela.


    AVISO: O Hachimi é um projeto impulsionado pela comunidade. Todas as traduções foram feitas por vários contribuidores da comunidade.
    Não é desenvolvido nem aprovado pela Cygames, Inc., e viola os termos de serviço do jogo. Ao continuar,
    aceita que o irá utilizar por sua conta e risco.
  translation_repo_heading: "Repositório de tradução"
  select_translation_repo: "Selecione um repositório de tradução:"
  no_compatible_repo: "Nenhum repositório de tradução é compatível com esta versão do jogo."
  skip_translation: "Ignorar traduções."
  complete_heading: "Tudo pronto!"
  complete_content: >-
    Clique em Concluído para guardar a configuração.
    Se escolheu um repositório de tradução, será efetuada uma verificação de atualizações,
    que o irá convidar a transferir os novos dados de tradução.
  tips_heading: "Bom saber"
  menu_key_tip: "Prima %{open_key_str} a qualquer momento para abrir o menu do HachimiRedux."
  conflicts_tip: >-
    Use apenas o HachimiRedux. Se o jogo bloquear ou se comportar de forma estranha, remova outros
    mods de jogo, overlays ou injetores de DLL (por ex. proxies version.dll / winhttp.dll / dxgi.dll,
    ou outras DLL de overlay) da pasta do jogo. Apenas plugins compilados a partir do HachimiRedux
    devem constar em load_libraries.

