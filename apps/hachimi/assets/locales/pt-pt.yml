steam_overlay_conflict_dialog:
  title: "Aviso"
  content: >-
    As compras podem não funcionar com o overlay do Hachimi ativado. Se o overlay da Steam já apareceu
    para efetuar uma compra, ignore esta mensagem e prima Não. Se não funcionou, prima Sim
    para desativar temporariamente o overlay do Hachimi. O jogo será fechado e, da próxima vez que iniciar,
    o overlay do Hachimi estará desativado e poderá efetuar uma compra. Depois disso, pode reiniciar
    o jogo novamente para reativar o overlay do Hachimi.
