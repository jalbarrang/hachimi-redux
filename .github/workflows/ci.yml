# =============================================================================
# CI Pipeline — HachimiRedux
#
# Design: fail fast, fail loud. Every check that passes green means the code
# actually meets the bar. No silent warnings, no cosmetic passes.
#
# Pipeline order (fastest/cheapest first):
#   1. Formatting (rustfmt)           — seconds, no deps
#   2. Supply chain (cargo-deny)      — seconds, no build
#   3. Unused deps (cargo-machete)    — seconds, heuristic
#   4. Lint (clippy, zero-warn)       — minutes, needs compile
#   5. Type check (cargo check)       — minutes, cross-platform
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  HACHIMI_IGNORE_DIRTY: "true"
  # Pin toolchain for reproducible CI
  RUST_VERSION: stable

# Cancel in-flight CI for the same PR/branch when new commits are pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Stage 1: Fast checks (no compilation, no deps)
  # ──────────────────────────────────────────────────────────────

  fmt:
    name: "1 · Rustfmt"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # ──────────────────────────────────────────────────────────────
  # Stage 2: Supply chain & dependency checks (no compilation)
  # ──────────────────────────────────────────────────────────────

  deny:
    name: "2 · cargo-deny"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  machete:
    name: "2 · Unused deps"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - name: Install cargo-machete
        run: cargo install cargo-machete
      - name: Check for unused dependencies (core)
        run: cargo machete

  # ──────────────────────────────────────────────────────────────
  # Stage 2: Architectural intent (hiker) — no compilation.
  # Non-negotiable invariants compiled + verified against codebase facts.
  # Currently: "Training Tracker tracking is fully manual" (no auto start/stop).
  # ──────────────────────────────────────────────────────────────
  intent:
    name: "2 · Intent (hiker)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install hiker
        run: |
          curl -fsSL https://raw.githubusercontent.com/jalbarrang/hiker/stable/install | sh
          echo "$HOME/.hiker/bin" >> "$GITHUB_PATH"
      - name: Verify architectural intent
        run: bash .hiker/tents/manual-tracking/run.sh

  # ──────────────────────────────────────────────────────────────
  # Stage 3: Clippy lint — ZERO WARNINGS policy
  # `-D warnings` promotes every warning to a hard error.
  # If clippy passes, the code meets the quality bar. Period.
  # ──────────────────────────────────────────────────────────────

  clippy-windows:
    name: "3 · Clippy (Windows)"
    needs: [fmt]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2

      - name: Patch dependencies
        shell: powershell
        run: |
          pushd ..

          git clone --revision 7288e4b2e5a305b239d0b16bbbed239bf56e64b4 https://github.com/emilk/egui.git
          cd egui
          $File = "crates/egui/src/containers/combo_box.rs"
          (Get-Content $File) -replace 'ui.set_min_width\(ui.available_width\(\)\);', '// ui.set_min_width(ui.available_width());' | Set-Content $File
          cd ..

          git clone --revision bc05ae3326a4bab419c768e9dffb0d576d942c2b https://github.com/jalbarran-series/egui-directx11.git
          cd egui-directx11
          $fxc = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "fxc.exe" | Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1
          if (-not $fxc) { Write-Error "fxc.exe not found"; exit 1 }
          & $fxc.FullName /nologo /O3 /T vs_4_0 /E vs_egui /Fo shaders/vs_egui.bin shaders/egui.hlsl
          & $fxc.FullName /nologo /O3 /T ps_4_0 /E ps_egui /Fo shaders/ps_egui.bin shaders/egui.hlsl
          popd

          # Drop the git-pinned egui patches first so the path patches below
          # replace them; appending duplicates is a Cargo.toml duplicate-key error.
          (Get-Content "Cargo.toml") -notmatch '^(egui|egui_extras|egui-directx11)\s*=' | Set-Content "Cargo.toml"

          Add-Content -Path "Cargo.toml" -Value "`n"
          $patches = @(
            "egui-directx11 = { path = '../egui-directx11' }",
            "egui = { path = '../egui/crates/egui' }",
            "egui_extras = { path = '../egui/crates/egui_extras' }"
          )
          Add-Content -Path "Cargo.toml" -Value $patches

      # Zero-warning policy: -D warnings makes ANY clippy warning a CI failure.
      - name: Clippy (core — zero warnings)
        run: >
          cargo clippy
          --target x86_64-pc-windows-msvc
          --all-targets
          -- -D warnings

  # ──────────────────────────────────────────────────────────────
  # Stage 4: Tests — unit test suite (Windows only, no game runtime)
  # ──────────────────────────────────────────────────────────────

  test-windows:
    name: "4 · Test (Windows)"
    needs: [clippy-windows]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2

      - name: Patch dependencies
        shell: powershell
        run: |
          pushd ..

          git clone --revision 7288e4b2e5a305b239d0b16bbbed239bf56e64b4 https://github.com/emilk/egui.git
          cd egui
          $File = "crates/egui/src/containers/combo_box.rs"
          (Get-Content $File) -replace 'ui.set_min_width\(ui.available_width\(\)\);', '// ui.set_min_width(ui.available_width());' | Set-Content $File
          cd ..

          git clone --revision bc05ae3326a4bab419c768e9dffb0d576d942c2b https://github.com/jalbarran-series/egui-directx11.git
          cd egui-directx11
          $fxc = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "fxc.exe" | Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1
          if (-not $fxc) { Write-Error "fxc.exe not found"; exit 1 }
          & $fxc.FullName /nologo /O3 /T vs_4_0 /E vs_egui /Fo shaders/vs_egui.bin shaders/egui.hlsl
          & $fxc.FullName /nologo /O3 /T ps_4_0 /E ps_egui /Fo shaders/ps_egui.bin shaders/egui.hlsl
          popd

          # Drop the git-pinned egui patches first so the path patches below
          # replace them; appending duplicates is a Cargo.toml duplicate-key error.
          (Get-Content "Cargo.toml") -notmatch '^(egui|egui_extras|egui-directx11)\s*=' | Set-Content "Cargo.toml"

          Add-Content -Path "Cargo.toml" -Value "`n"
          $patches = @(
            "egui-directx11 = { path = '../egui-directx11' }",
            "egui = { path = '../egui/crates/egui' }",
            "egui_extras = { path = '../egui/crates/egui_extras' }"
          )
          Add-Content -Path "Cargo.toml" -Value $patches

      - name: Run tests (core)
        run: cargo test --lib

  # ──────────────────────────────────────────────────────────────
  # Stage 5: Type check — cross-platform compilation verification
  # ──────────────────────────────────────────────────────────────

  check-windows:
    name: "5 · Check (Windows)"
    needs: [test-windows]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2

      - name: Patch dependencies
        shell: powershell
        run: |
          pushd ..

          git clone --revision 7288e4b2e5a305b239d0b16bbbed239bf56e64b4 https://github.com/emilk/egui.git
          cd egui
          $File = "crates/egui/src/containers/combo_box.rs"
          (Get-Content $File) -replace 'ui.set_min_width\(ui.available_width\(\)\);', '// ui.set_min_width(ui.available_width());' | Set-Content $File
          cd ..

          git clone --revision bc05ae3326a4bab419c768e9dffb0d576d942c2b https://github.com/jalbarran-series/egui-directx11.git
          cd egui-directx11
          $fxc = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "fxc.exe" | Where-Object { $_.FullName -like "*x64*" } | Select-Object -First 1
          if (-not $fxc) { Write-Error "fxc.exe not found"; exit 1 }
          & $fxc.FullName /nologo /O3 /T vs_4_0 /E vs_egui /Fo shaders/vs_egui.bin shaders/egui.hlsl
          & $fxc.FullName /nologo /O3 /T ps_4_0 /E ps_egui /Fo shaders/ps_egui.bin shaders/egui.hlsl
          popd

          # Drop the git-pinned egui patches first so the path patches below
          # replace them; appending duplicates is a Cargo.toml duplicate-key error.
          (Get-Content "Cargo.toml") -notmatch '^(egui|egui_extras|egui-directx11)\s*=' | Set-Content "Cargo.toml"

          Add-Content -Path "Cargo.toml" -Value "`n"
          $patches = @(
            "egui-directx11 = { path = '../egui-directx11' }",
            "egui = { path = '../egui/crates/egui' }",
            "egui_extras = { path = '../egui/crates/egui_extras' }"
          )
          Add-Content -Path "Cargo.toml" -Value $patches

      - name: Cargo check (core)
        run: cargo check --target x86_64-pc-windows-msvc
