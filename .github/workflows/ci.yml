# =============================================================================
# CI Pipeline — HachimiRedux
#
# Design: fail fast, fail loud. Every check that passes green means the code
# actually meets the bar. No silent warnings, no cosmetic passes.
#
# Pipeline order (fastest/cheapest first):
#   1. Formatting (rustfmt)           — seconds, no deps
#   2. Supply chain (cargo-deny)      — seconds, no build
#   3. Unused deps (cargo-machete)    — seconds, heuristic
#   4. Lint (clippy, zero-warn)       — minutes, needs compile
#   5. Type check (cargo check)       — minutes, cross-platform
# =============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  HACHIMI_IGNORE_DIRTY: "true"
  # Pin toolchain for reproducible CI
  RUST_VERSION: stable

# Cancel in-flight CI for the same PR/branch when new commits are pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────────────────────
  # Stage 1: Fast checks (no compilation, no deps)
  # ──────────────────────────────────────────────────────────────

  fmt:
    name: "1 · Rustfmt"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  # ──────────────────────────────────────────────────────────────
  # Stage 2: Supply chain & dependency checks (no compilation)
  # ──────────────────────────────────────────────────────────────

  deny:
    name: "2 · cargo-deny"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  machete:
    name: "2 · Unused deps"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
      - name: Install cargo-machete
        run: cargo install cargo-machete
      - name: Check for unused dependencies (core)
        run: cargo machete

  # ──────────────────────────────────────────────────────────────
  # Stage 2: Architectural intent (hiker) — no compilation.
  # Non-negotiable invariants compiled + verified against codebase facts.
  # Currently: "Training Tracker tracking is fully manual" (no auto start/stop).
  # ──────────────────────────────────────────────────────────────
  intent:
    name: "2 · Intent (hiker)"
    runs-on: ubuntu-latest
    # Pin the hiker release. Bump when adopting a newer CLI. We download the
    # static musl asset directly (not the `curl | sh` installer) so CI never hits
    # the unauthenticated GitHub API rate limit that resolves `latest`.
    env:
      HIKER_VERSION: v0.1.2
    steps:
      - uses: actions/checkout@v6
      - name: Install hiker
        run: |
          set -euo pipefail
          url="https://github.com/jalbarrang/hiker/releases/download/${HIKER_VERSION}/hiker-x86_64-unknown-linux-musl.tar.gz"
          curl -fsSL "$url" -o /tmp/hiker.tar.gz
          tar -xzf /tmp/hiker.tar.gz -C /tmp
          sudo install -m 0755 /tmp/hiker /usr/local/bin/hiker
          hiker --version
      - name: Verify architectural intent
        run: bash .hiker/tents/manual-tracking/run.sh

  # ──────────────────────────────────────────────────────────────
  # Stage 3: Clippy lint — ZERO WARNINGS policy
  # `-D warnings` promotes every warning to a hard error.
  # If clippy passes, the code meets the quality bar. Period.
  # ──────────────────────────────────────────────────────────────

  clippy-windows:
    name: "3 · Clippy (Windows)"
    needs: [fmt]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: swatinem/rust-cache@v2

      # Zero-warning policy: -D warnings makes ANY clippy warning a CI failure.
      - name: Clippy (core — zero warnings)
        run: >
          cargo clippy
          --target x86_64-pc-windows-msvc
          --all-targets
          -- -D warnings

  # ──────────────────────────────────────────────────────────────
  # Stage 4: Tests — unit test suite (Windows only, no game runtime)
  # ──────────────────────────────────────────────────────────────

  test-windows:
    name: "4 · Test (Windows)"
    needs: [clippy-windows]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2

      - name: Run tests (core)
        run: cargo test --lib

  # ──────────────────────────────────────────────────────────────
  # Stage 5: Type check — cross-platform compilation verification
  # ──────────────────────────────────────────────────────────────

  check-windows:
    name: "5 · Check (Windows)"
    needs: [test-windows]
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2

      - name: Cargo check (core)
        run: cargo check --target x86_64-pc-windows-msvc
