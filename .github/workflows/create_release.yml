name: Create Release

on: workflow_dispatch

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-windows:
    runs-on: windows-latest
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@v6
      - name: Cache Rust dependencies
        uses: swatinem/rust-cache@v2

      - uses: dtolnay/rust-toolchain@stable
      - name: Build Hachimi for Windows
        run: |
          # Training Tracker is compiled into hachimi.dll (in-core module), so the
          # core build is the only artifact — no separate plugin DLL.
          cargo build --target x86_64-pc-windows-msvc --target-dir build --release -p hachimi
          move build\x86_64-pc-windows-msvc\release\hachimi.dll build
        env:
          HACHIMI_IGNORE_DIRTY: "true"

      - name: Build Cellar
        run: |
          # Clone OUTSIDE the repo so the nested crate isn't seen by our workspace
          # (workspace `exclude` does not prevent the "believes it's in a workspace"
          # error when building from inside the dir).
          git clone --depth 1 --revision d4c3f79801c8131e26df585766c35e5ce11ec57f https://github.com/Hachimi-Hachimi/Cellar ..\Cellar
          pushd ..\Cellar
          cargo build --target x86_64-pc-windows-msvc --target-dir build --release
          popd

      - name: Check out FunnyHoney
        run: git clone --depth 1 --revision 418b5348bd9b7376cc7485c591ca69d49aa4d805 https://codeberg.org/LeadRDRK/FunnyHoney.git

      - name: Build Installer
        run: |
          # The installer is a vendored workspace member (installer/). Stage the
          # artifacts it embeds, then build it explicitly (-p) from the workspace.
          copy build\hachimi.dll apps\installer\
          move ..\Cellar\build\x86_64-pc-windows-msvc\release\cellar.dll apps\installer\
          move FunnyHoney\FunnyHoney.exe apps\installer\
          cargo build --target x86_64-pc-windows-msvc --target-dir build --release -p hachimi_installer --features compress_bin
          move build\x86_64-pc-windows-msvc\release\hachimi_installer.exe build

      - name: Get checksums for Windows binaries
        shell: bash
        run: |
          curl -L "https://github.com/BLAKE3-team/BLAKE3/releases/latest/download/b3sum_windows_x64_bin.exe" -o b3sum.exe
          DLL_HASH=($(./b3sum.exe build/hachimi.dll | tr -d '\r'))
          EXE_HASH=($(./b3sum.exe build/hachimi_installer.exe | tr -d '\r'))
          cat <<EOF > build/blake3.json
          {
            "hachimi.dll": "$DLL_HASH",
            "hachimi_installer.exe": "$EXE_HASH"
          }
          EOF

      - name: Attest Windows
        uses: actions/attest@v4
        with:
          subject-path: |
            build/blake3.json
            build/hachimi.dll
            build/hachimi_installer.exe

      - name: Upload Windows binaries
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: |
            build/blake3.json
            build/hachimi.dll
            build/hachimi_installer.exe

  create-release:
    needs: [build-windows]
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[ci skip]')"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Get release version
        id: get_info
        run: |
          VERSION=$(curl -sL "https://raw.githubusercontent.com/${{ github.repository }}/main/apps/hachimi/Cargo.toml" | \
            awk '/^\[package\]/{flag=1} flag && /^version/{print $3; exit}' | \
            tr -d '"')
          echo "RELEASE_VERSION=v$VERSION" >> $GITHUB_ENV

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Stage release files
        # The current upload/download-artifact actions deliver the artifact as a
        # zip without extracting it, so the previous `artifacts/windows/*` glob
        # matched nothing. Unzip whatever was downloaded (and copy any already-
        # loose files) into a flat dir so the release step is layout-agnostic.
        run: |
          mkdir -p release-files
          find artifacts -type f -name '*.zip' -exec unzip -o {} -d release-files \;
          find artifacts -type f ! -name '*.zip' -exec cp -f {} release-files/ \;
          echo "Staged files:"
          ls -l release-files

      - name: Create release notes
        run: |
          if ! git rev-parse "$LATEST_TAG" >/dev/null 2>&1; then
            git tag $LATEST_TAG
          fi

          # `|| true` so set -e doesn't abort on the first release (no prior tag);
          # the fallback to the root commit then takes over.
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${LATEST_TAG}^" 2>/dev/null || true)
          if [ -z "$PREVIOUS_TAG" ]; then
            PREVIOUS_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          echo "> HachimiRedux — based on Hachimi (upstream base: 0.25.4)." > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## What's Changed" >> CHANGELOG.md
          COMMIT_HASHES=$(git rev-list --no-merges ${PREVIOUS_TAG}..${LATEST_TAG})

          IFS=$'\n'

          for hash in $COMMIT_HASHES; do
            subject=$(git show -s --format=%s $hash)
            body=$(git show -s --format=%b $hash)
            author_login=$(gh api "repos/${{ github.repository }}/commits/$hash" --jq '.author.login' 2>/dev/null || echo "")
            if [ -n "$author_login" ]; then
              author="$author_login"
            else
              author=$(git show -s --format=%an $hash)
            fi
            short_hash=$(git show -s --format=%h $hash)

            echo "* **$subject**" >> CHANGELOG.md

            if [ -n "$body" ]; then
              echo "$body" | while read -r line; do
                if [ -z "$line" ]; then continue; fi
                clean_line=$(echo "$line" | sed -E 's/^[ \t]*[-*+][ \t]*//')
                echo "    * $clean_line" >> CHANGELOG.md
              done
            fi
            echo "    (by @$author in $short_hash)" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          done

          unset IFS
        env:
          GH_TOKEN: ${{ github.token }}
          LATEST_TAG: ${{ env.RELEASE_VERSION }}

      - name: Upload binaries to a release
        uses: softprops/action-gh-release@v3
        with:
          body_path: CHANGELOG.md
          files: |
            release-files/*
          fail_on_unmatched_files: true
          tag_name: ${{ env.RELEASE_VERSION }}
