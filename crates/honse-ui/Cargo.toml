[package]
name = "honse-ui"
version = "0.1.0"
edition.workspace = true
license = "MIT"
description = "shadcn-flavored component kit for dioxus-egui"
publish = false

[dependencies]
dioxus-egui = { path = "../dioxus-egui", version = "0.1" }

[dev-dependencies]
dioxus-egui = { path = "../dioxus-egui", version = "0.1", features = ["introspect"] }

[features]
default = []
# Standalone gallery binary (needs the eframe-backed window runner).
standalone = ["dioxus-egui/standalone"]

[[bin]]
name = "gallery"
path = "src/bin/gallery.rs"
required-features = ["standalone"]

[lints]
workspace = true
